kind = "web"
previewPath = "/"
title = "Compass"
version = "1.0.0"
id = "artifacts/workflow-mirror"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25516

[services.development]
run = "pnpm --filter @workspace/workflow-mirror run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/workflow-mirror", "run", "build" ]
publicDir = "artifacts/workflow-mirror/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25516"
BASE_PATH = "/"
